name: Deploy Hugging Face Space

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Prepare isolated Space snapshot
        run: |
          mkdir /tmp/tracearena-space
          cp -R deploy/huggingface-static/. /tmp/tracearena-space/
          cd /tmp/tracearena-space
          git init --initial-branch=main
          git add -A
          git -c user.name=tracearena-bot -c user.email=tonyhyworld@gmail.com \
            commit -m "Deploy TraceArena static AI world demo"

      - name: Push to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          test -n "$HF_TOKEN"
          cd /tmp/tracearena-space
          git push --force \
            "https://tonyworld888:${HF_TOKEN}@huggingface.co/spaces/tonyworld888/tracearena-demo" \
            main:main
