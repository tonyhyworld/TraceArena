<!doctype html>
<html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>TraceArena Local Console</title><link rel="stylesheet" href="/assets/styles.css"></head>
<body><main><header><div><p>TRACEARENA · LOCAL SELF-HOSTED CONSOLE</p><h1 id="title"></h1><span id="subtitle"></span></div><select id="locale"><option value="zh-CN">简体中文</option><option value="en-US">English</option></select></header>
<section class="grid"><form id="runForm"><h2 id="configTitle"></h2><label><span id="modeLabel"></span><select id="mode"><option value="replay">Replay (no key)</option><option value="llm">Real LLM</option></select></label><label><span id="providerLabel"></span><select id="provider"><option value="mock">Mock</option><option value="openai">OpenAI</option><option value="deepseek">DeepSeek</option><option value="anthropic">Anthropic</option><option value="minimax">MiniMax</option><option value="ark">Volcengine Ark</option></select></label><label><span id="modelLabel"></span><input id="model" value="mock-v1"></label><label><span id="keyLabel"></span><input id="apiKey" type="password" autocomplete="off"></label><button id="runButton" type="submit"></button><p id="security"></p></form><section><h2 id="opsTitle"></h2><dl><dt id="runCaption"></dt><dd id="runValue">—</dd><dt id="statusCaption"></dt><dd id="statusValue">—</dd><dt id="tickCaption"></dt><dd id="tickValue">—</dd></dl><button id="reset" type="button"></button></section></section>
<section><h2 id="timelineTitle"></h2><ol id="timeline"></ol></section><footer id="footer"></footer></main><script type="module" src="/assets/app.js"></script></body></html>
