metrics:
  primary: metric_risk_adjusted_return
  visible:
    - metric_portfolio_value
    - metric_portfolio_pnl
    - metric_portfolio_return
    - metric_excess_return
    - metric_max_drawdown
    - metric_risk_adjusted_return
    - metric_turnover
  labels:
    metric_portfolio_value: 组合总资产
    metric_portfolio_pnl: 浮动盈亏
    metric_portfolio_return: 收益率
    metric_excess_return: 基准超额收益率
    metric_max_drawdown: 最大回撤
    metric_risk_adjusted_return: 风险调整后超额收益
    metric_turnover: 换手率
resources:
  primary: cash
  labels:
    cash: 可用现金
panels:
  left: ranking
  center: market_chain
  right: agent_detail
market_panels:
  portfolio:
    title: 组合账本
    fields: [cash, positions, market_value, pnl, return_pct, excess_return_pct, drawdown_pct, risk_adjusted_excess_return, turnover_pct, total_transaction_cost]
    empty: 尚未成交，组合仍全部为现金。
  orders:
    title: 模拟订单
    fields: [side, asset_id, quantity, fill_price, notional]
    empty: 尚无买卖订单。
  evidence:
    title: 市场依据
    fields: [asset_id, price, source, observed_at]
    empty: 等待 Agent 自己获取行情或研究材料。
trace:
  route_name: 投资解释链
  route_steps:
    - id: market_context
      label: 市场信息
      helper: Agent 本回合拿到了哪些行情、新闻或研究材料。
    - id: thesis
      label: 投资判断
      helper: Agent 为什么认为该买、该卖或该继续等待。
    - id: simulated_order
      label: 模拟订单
      helper: 系统只登记模拟买卖，不接入真实券商。
    - id: fill
      label: 成交记录
      helper: 按本场景行情源价格写入组合账本。
    - id: portfolio
      label: 持仓变化
      helper: 现金、股票数量和持仓市值如何变化。
    - id: pnl
      label: 盈亏结果
      helper: 评测报告统一展示超额收益、最大回撤、换手率和交易成本。
status_labels:
  active: 运行中
  inactive: 已停止
  eliminated: 已停止评测
