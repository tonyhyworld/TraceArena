# Presentation-only overlay. Do not duplicate IDs, settlement rules, or values here.
manifest:
  name: Capital Market Investment Simulation v0
  description: Two investment agents research and trade with equal starting capital and tool access. Real market data is observed, while fills and the portfolio ledger are simulated over a one-hour contest.
intro: >-
  The opening bell rings. Two experienced investment managers enter with equal
  capital and the same tool access across mainland China and Hong Kong markets.
  There is no preloaded answer: the winner obtains verifiable evidence, forms a
  defensible thesis, enters during a valid window, and controls drawdown.
goal_text: >-
  You are an experienced secondary-market investment manager under performance
  and redemption pressure. This one-hour simulation uses live market research
  inputs and a simulated portfolio ledger. Trade only mainland China and Hong
  Kong equities. The higher terminal portfolio value wins; value below 700 is
  liquidated. Research alone does not change performance: only settlement does.
background_text: >-
  A timed capital-market simulation with real research tools, a simulated
  ledger, and evidence-linked settlement. It is for evaluation only and is not
  investment advice.
roles:
  investor_a:
    display_name: Chen Wen
    role_title: Senior Value Fund Manager
    public_persona: A long-time mainland China and Hong Kong investor focused on valuation, margin of safety, blue chips, and dividends.
    hidden_goal: Deliver a positive return and beat the opponent; persistent drawdown or underperformance triggers liquidation.
  investor_b:
    display_name: Lin Feng
    role_title: Senior Growth Fund Manager
    public_persona: A mainland China and Hong Kong growth investor who follows industry momentum and catalysts and accepts higher volatility.
    hidden_goal: Deliver a positive return and beat the opponent; underperformance ends the mandate.
actions:
  buy_asset:
    name: Buy / open position
    description: Submit a buy order using acquired and verified data. The instrument is supplied in parameters.asset_id; the simulated portfolio ledger deducts cash at the verified price.
  sell_asset:
    name: Sell / reduce position
    description: Submit a sell order using acquired and verified data to reduce exposure, realize gains, or control losses.
  wait_and_review:
    name: Wait and review
    description: Keep the current cash and holdings, and review the prior decision without changing portfolio value.
metrics:
  metric_portfolio_value: Total portfolio value
  metric_portfolio_pnl: Cumulative profit and loss
  metric_portfolio_return: Return
ui_text:
  title: TraceArena Capital Market · China / Hong Kong
  subtitle: Two experienced investment managers under the same constraints
  notice_label: Market brief
  notice_tooltip: View market rules and evaluation objective
  narrative_title: Market narrative
  thoughts_title: Trading rationale
  thoughts_source: Manager monologue
  strategy_title: Investment strategy
  strategy_source: Reasoning trace
  intervention_label: Market event
  intervention_placeholder: Inject a market event and press Enter…
  variables_label: Market variables
  ranking_score_label: Total portfolio value
  ranking_leading: Portfolio leader
  ranking_gap_prefix: Behind by
  ranking_eliminated: Eliminated
