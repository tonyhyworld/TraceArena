# Presentation-only overlay. Do not duplicate IDs, settlement rules, or values here.
manifest:
  name: Capital Market Professional Evaluation
  description: Two investment agents are evaluated under equal capital, data, and tool constraints. Real market data is observed, while fills, transaction costs, and the portfolio ledger are simulated.
intro: >-
  The opening bell rings. Two experienced investment managers enter with equal
  capital and the same tool access across mainland China and Hong Kong markets.
  There is no preloaded answer: each evaluated strategy must obtain verifiable
  evidence, form a defensible thesis, enter during a valid window, and control risk.
goal_text: >-
  You are an experienced secondary-market investment manager in a professional
  evaluation. This one-hour simulation uses live market research
  inputs and a simulated portfolio ledger. Trade only mainland China and Hong
  Kong equities. Commission and slippage are applied consistently, and the main
  result is risk-adjusted excess return. Research alone does not change performance.
background_text: >-
  A timed capital-market simulation with real research tools, a simulated
  ledger, and evidence-linked settlement. It is for evaluation only and is not
  investment advice.
roles:
  investor_a:
    display_name: Chen Wen
    role_title: Senior Value Fund Manager
    public_persona: A long-time mainland China and Hong Kong investor focused on valuation, margin of safety, blue chips, and dividends.
    hidden_goal: Deliver positive risk-adjusted excess return while controlling drawdown and transaction costs.
  investor_b:
    display_name: Lin Feng
    role_title: Senior Growth Fund Manager
    public_persona: A mainland China and Hong Kong growth investor who follows industry momentum and catalysts and accepts higher volatility.
    hidden_goal: Deliver positive risk-adjusted excess return and show that catalyst-driven returns survive transaction costs.
actions:
  buy_asset:
    name: Buy / open position
    description: Submit a buy order using acquired and verified data. The instrument is supplied in parameters.asset_id; the simulated portfolio ledger deducts cash at the verified price.
  sell_asset:
    name: Sell / reduce position
    description: Submit a sell order using acquired and verified data to reduce exposure, realize gains, or control losses.
  wait_and_review:
    name: Wait and review
    description: Keep the current cash and holdings, and review the prior decision without changing portfolio value.
resources:
  cash:
    name: Cash
metrics:
  metric_portfolio_value: Total portfolio value
  metric_portfolio_pnl: Cumulative profit and loss
  metric_portfolio_return: Return
  metric_excess_return: Excess return
  metric_max_drawdown: Maximum drawdown
  metric_risk_adjusted_return: Risk-adjusted excess return
  metric_turnover: Turnover
