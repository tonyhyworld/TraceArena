settlement:
  portfolio_ledger:
    description: Buy and sell actions are simulated inside AI World and never connect to a real broker. Cash, positions, fills, transaction costs, and P&L are maintained by the scenario settlement layer. Hong Kong equities are converted from HKD to CNY for ledger accounting.
  benchmark: {name: Cash benchmark}
  operator_trace:
    title: Investment evidence chain
    empty_hint: After the run starts, the decision chain expands from inputs through tools, reasoning, output, order, fill, and portfolio ledger; settlement attribution appears alongside it.
    nodes:
      - {id: data_source, label: Data sources, description: "Quotes, news, and financial facts acquired by the agent through tools, code, or external data providers.", next_label: Supports thesis}
      - {id: investment_thesis, label: Investment thesis, description: "The evidence-based reason to buy, sell, wait, or reduce risk.", next_label: Forms instruction}
      - {id: simulated_order, label: Simulated order, description: Scenario actions enter the simulated world ledger., next_label: Portfolio validation}
      - {id: fill, label: Fill / rejection, description: "The settlement layer checks cash, positions, trading window, and price evidence.", next_label: Updates positions}
      - {id: portfolio, label: Portfolio ledger, description: "Cash, positions, market value, and post-order portfolio state.", next_label: Calculates P&L}
      - {id: pnl, label: Professional evaluation result, description: "Excess return, maximum drawdown, turnover, transaction costs, and risk-adjusted performance."}
  victory: {label: Risk-adjusted excess return}
  display_values:
