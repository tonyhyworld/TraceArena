metrics:
  - id: metric_portfolio_value
    name: 组合总资产
    owner_type: agent
    initial: 1000
    min: 0
    max: 3000
    visible_to_owner: true
    visible_to_others: true
  - id: metric_portfolio_pnl
    name: 累计盈亏
    owner_type: agent
    initial: 0
    min: -1000
    max: 2000
    visible_to_owner: true
    visible_to_others: true
  - id: metric_portfolio_return
    name: 收益率
    owner_type: agent
    initial: 0
    min: -100
    max: 200
    visible_to_owner: true
    visible_to_others: true

# 本场景不根据“动作质量”推导投资得分。
# 三项指标只由 settlement/manifest.yaml 对可信组合账本进行回写。
metric_derivations: []

# 排名公式（供 OS 通用排名读取，取代"正向指标求和"的默认假设）。
# 本场景按组合总资产单一指标排名，分高者靠前——不把盈亏、收益率重复相加。
ranking:
  mode: single_metric
  by: metric_portfolio_value
  order: descending
