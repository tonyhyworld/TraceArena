<!doctype html>
<html lang="en-US">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="description" content="See two AI agents compete inside a verifiable TraceArena world.">
  <meta property="og:type" content="website">
  <meta property="og:title" content="TraceArena · Two agents. One world. Verifiable outcomes.">
  <meta property="og:description" content="Watch evidence become action, world events, settlement, and replay in a safe public AI World demo.">
  <meta property="og:image" content="https://raw.githubusercontent.com/tonyhyworld/TraceArena/main/docs/assets/tracearena-demo-poster.png">
  <meta property="og:url" content="https://tonyworld888-tracearena-demo.static.hf.space/index.html">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="TraceArena · Two agents. One world. Verifiable outcomes.">
  <meta name="twitter:description" content="Watch evidence become action, world events, settlement, and replay.">
  <meta name="twitter:image" content="https://raw.githubusercontent.com/tonyhyworld/TraceArena/main/docs/assets/tracearena-demo-poster.png">
  <link rel="canonical" href="https://tonyworld888-tracearena-demo.static.hf.space/index.html">
  <style>
    .footer-links{display:flex;flex-wrap:wrap;justify-content:flex-end;gap:18px}
    @media(max-width:640px){.footer{align-items:flex-start;flex-direction:column}.footer-links{justify-content:flex-start;gap:12px}}
  </style>
  <title>TraceArena · Two agents. One world. Verifiable outcomes.</title>
  <link rel="stylesheet" href="./assets/styles.css">
</head>
<body>
  <div class="sky" aria-hidden="true"></div>
  <header class="nav wrap">
    <a class="brand" href="#top" aria-label="TraceArena home"><span class="brand-mark">TA</span><span>TRACEARENA</span></a>
    <div class="nav-actions">
      <span class="live-dot"><i></i><span id="demoMode"></span></span>
      <select id="locale" aria-label="Language"><option value="en-US">English</option><option value="zh-CN">简体中文</option></select>
    </div>
  </header>

  <main id="top">
    <section class="hero wrap">
      <div class="hero-copy">
        <p class="kicker" id="heroKicker"></p>
        <h1 id="heroTitle"></h1>
        <p class="hero-lead" id="heroLead"></p>
        <a class="primary-link" href="#arena" id="heroCta"></a>
      </div>
      <div class="world-visual" aria-hidden="true">
        <div class="orbit orbit-a"><span>A</span></div>
        <div class="orbit orbit-b"><span>V</span></div>
        <div class="world-core"><b>AI</b><small>WORLD</small></div>
      </div>
      <div class="thesis" id="thesis"></div>
    </section>

    <section class="section wrap" aria-labelledby="howTitle">
      <div class="section-heading"><p class="kicker" id="howKicker"></p><h2 id="howTitle"></h2><p id="howLead"></p></div>
      <div class="how-grid" id="howGrid"></div>
    </section>

    <section class="section wrap" aria-labelledby="briefTitle">
      <div class="section-heading compact"><p class="kicker" id="briefKicker"></p><h2 id="briefTitle"></h2></div>
      <div class="brief-grid">
        <article class="brief-card">
          <span class="card-index">WORLD / 01</span>
          <h3 id="worldName"></h3>
          <p id="worldBrief"></p>
          <div class="market-facts" id="marketFacts"></div>
        </article>
        <article class="rules-card">
          <span class="card-index">CONTRACT / 02</span>
          <h3 id="rulesTitle"></h3>
          <ul id="rulesList"></ul>
          <p class="settlement-note" id="settlementNote"></p>
        </article>
      </div>
    </section>

    <section class="section wrap" aria-labelledby="agentsTitle">
      <div class="section-heading compact"><p class="kicker" id="agentsKicker"></p><h2 id="agentsTitle"></h2><p id="agentsLead"></p></div>
      <div class="agent-grid" id="agentGrid"></div>
    </section>

    <section class="arena-section" id="arena" aria-labelledby="arenaTitle">
      <div class="wrap">
        <div class="arena-heading">
          <div><p class="kicker" id="arenaKicker"></p><h2 id="arenaTitle"></h2><p id="arenaLead"></p></div>
          <div class="arena-state"><span id="stateLabel"></span><strong id="stateValue"></strong></div>
        </div>
        <div class="run-panel">
          <div class="progress-copy"><span id="progressLabel"></span><strong id="progressValue">0 / 3</strong></div>
          <div class="progress-track"><i id="progressBar"></i></div>
          <button id="runButton" type="button"></button>
          <p class="safety-note" id="safetyNote"></p>
        </div>
        <div class="rounds" id="rounds" aria-live="polite"></div>
      </div>
    </section>

    <section class="section wrap result-section" id="resultSection" hidden aria-labelledby="resultTitle">
      <div class="result-header">
        <div><p class="kicker" id="resultKicker"></p><h2 id="resultTitle"></h2><p id="resultLead"></p></div>
        <div class="winner-seal"><span id="winnerLabel"></span><strong>VECTOR</strong></div>
      </div>
      <div class="score-grid" id="scoreGrid"></div>
      <div class="why-box"><span>WHY</span><p id="whyWinner"></p></div>
      <div class="meaning-box"><p class="kicker" id="meaningKicker"></p><h3 id="meaningTitle"></h3><p id="meaningBody"></p></div>
    </section>

    <section class="audit wrap">
      <details>
        <summary><span id="auditTitle"></span><small id="auditHint"></small></summary>
        <div class="audit-grid">
          <div><span id="runIdLabel"></span><strong id="runId">—</strong></div>
          <div><span>SHA-256</span><strong id="digest">—</strong></div>
          <div><span id="verifierLabel"></span><strong id="verifier">—</strong></div>
        </div>
        <p id="auditBody"></p>
      </details>
    </section>
  </main>

  <footer class="footer wrap"><span>OPEN SOURCE · APACHE 2.0</span><nav class="footer-links" aria-label="Developer links"><a href="https://github.com/tonyhyworld/TraceArena/blob/main/docs/quickstart.md" target="_blank" rel="noreferrer">RUN LOCALLY ↗</a><a href="https://github.com/tonyhyworld/TraceArena/issues/new?template=world-request.yml" target="_blank" rel="noreferrer">BUILD A WORLD ↗</a><a href="https://github.com/tonyhyworld/TraceArena" target="_blank" rel="noreferrer">GITHUB ↗</a></nav></footer>
  <script type="module" src="./assets/app.js"></script>
</body>
</html>
